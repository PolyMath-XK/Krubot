name: "Krubot Lexicon: HyperDX Markdown Manifestation 🚀⚒️☢️"

# 1. THE EVENTS (Triggers - The Awakening Mechanism)
# This section defines precisely when this workflow should "wake up" and execute.
# By using 'paths', we achieve EXTREME PERFORMANCE OPTIMIZATION:
# The workflow is ONLY triggered if the specified files are modified in a 'push' event.
# This prevents unnecessary runs for unrelated code changes, saving compute time and resources.
on:
  push:
    branches:
      - main # The workflow activates when code is pushed to the 'main' branch.
    paths:
      - 'README.mdx' # Trigger if the main template file changes.
      - 'Code_Showcase.md' # Trigger if the specific 'Code_Showcase.md' file changes (now at root).
      - '.github/workflows/compile_readme.yml' # Trigger if the workflow definition itself changes, for self-correction.

# 2. PERMISSIONS (The God-Mode Authorization)
# This is CRITICAL. It grants the GitHub Actions bot the necessary authority
# to write (commit and push) changes back to the repository.
# Without 'write' permission, the bot can only read, leading to a '403 Forbidden' error.
# (Remember to enable "Read and write permissions" in your repository settings -> Actions -> General).
permissions:
  contents: write # Explicitly allows the workflow to modify repository content.

# 3. THE JOB (The Core Execution Unit)
# A workflow can have multiple jobs, but for this focused task, a single job is
# the most efficient and performant approach, minimizing overhead.
jobs:
  manifest_readme:
    name: "Unify & Manifest README.md 🗜️✨" # A descriptive name for the job, enhancing DX.
    runs-on: ubuntu-latest # Specifies the virtual machine environment. 'ubuntu-latest' provides a modern, fast, and reliable Linux environment.

    # 4. THE STEPS (The Sequential Operations)
    # Each step is a distinct command or action executed in order.
    steps:
      # Step 1: Checkout the repository code.
      # 'actions/checkout@v4' is the standard and highly optimized action for fetching your repository.
      # PERFORMANCE OPTIMIZATION: 'fetch-depth: 1' is a CRUCIAL setting. It tells Git to ONLY fetch
      # the latest commit, not the entire history of the repository. This dramatically reduces
      # clone time, network bandwidth, and disk usage for every workflow run, leading to significant speed gains.
      - name: "Checkout Krubot Source Matrix 📜🌌"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Step 2: Setup the PHP environment.
      # 'shivammathur/setup-php@v2' is a highly performant and widely used action for PHP.
      # Aligning with PHP 8.2.30.
      # PERFORMANCE OPTIMIZATION: 'coverage: none' ensures that Xdebug or PCOV (code coverage tools)
      # are NOT installed or enabled, eliminating any associated overhead and maximizing PHP script execution speed.
      - name: "Invoke PHP 8.2.30 Engine ⚙️⚡"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Installs PHP 8.2.x.
          coverage: none     # Disables code coverage tools for maximum performance.

      # Step 3: The PolyMath Alchemy - Compiling the README.md.
      # This step executes an INLINE PHP SCRIPT directly. This is a HYPER-PERFORMANCE technique
      # as it avoids the overhead of creating, writing, and executing a separate script file.
      # It leverages native PHP capabilities for speed and efficiency.
      - name: "🛠️ Transmute README_TEMPLATE to README.md"
        id: compile_step # Assigns an ID to this step for potential future referencing (e.g., passing outputs).
        run: |
          php -r "$(cat <<'EOPHP'
          /**
           * @author: Pro-Gemini-XTR 
           * @description: Orchestrates the dimensional merging of Markdown fragments into a unified README.md.
           *              This script embodies HyperDX principles by being self-contained,
           *              efficient, and directly leveraging PHP 8.2.30 capabilities.
           *              It aligns with ECMA2026 principles of modularity and clear intent.
           *              Handles dynamic inclusion of Markdown files based on a specific pattern.
           */
          
          // Define constants for file paths, enhancing maintainability and clarity (HyperDX).
          define("README_TEMPLATE_PATH", "README.mdx");
          define("README_OUTPUT_PATH", "README.md");
          
          // Regex pattern for inclusion directives: <!-- INCLUDE: path/to/file.md -->
          // (?<file>[^\\s]+(?:\\.md|\\.MD)) captures the file path into a named group "file",
          // ensuring only .md or .MD files are considered, adding robustness.
          define("INCLUDE_PATTERN", "/<!--\\s*INCLUDE:\\s*(?<file>[^\\s]+(?:\\.md|\\.MD))\\s*-->/");
          
          $templateContent = "";
          // ROBUSTNESS: Critical check to ensure the template file actually exists.
          // If not, it logs a critical error and exits, preventing further failures.
          if (!file_exists(README_TEMPLATE_PATH)) {
              error_log("[CRITICAL] Template file not found: " . README_TEMPLATE_PATH . ". Aborting manifestation.");
              exit(1); 
          }
          $templateContent = file_get_contents(README_TEMPLATE_PATH);
          
          // Core Logic: Perform the transclusion (inclusion) using a callback function for each regex match.
          // preg_replace_callback is highly efficient for this task in PHP.
          $compiledContent = preg_replace_callback(
              INCLUDE_PATTERN,
              function ($matches) {
                  $targetFile = trim($matches["file"]); // Extract the file path from the regex match.
                  
                  // SECURITY & ROBUSTNESS: Define an explicit whitelist of allowed files/paths for inclusion.
                  // This prevents arbitrary file inclusion (e.g., sensitive files like .env or system files)
                  // and enforces a clear architectural boundary. This is a CRITICAL PolyMath-level control.
                  $allowedPaths = [
                      "Code_Showcase.md", // Explicitly allow Code_Showcase.md from the root.
                      // Add other specific files or prefixes for directories here, e.g.:
                      // "src/Nexus/NoxiousSamples.md",
                      // "docs/chapters/", // For files starting with "docs/chapters/"
                  ];
                  
                  // Check if the target file is in the whitelist or starts with an allowed directory prefix.
                  $isAllowed = false;
                  foreach ($allowedPaths as $allowedPath) {
                      if ($targetFile === $allowedPath || str_starts_with($targetFile, $allowedPath)) {
                          $isAllowed = true;
                          break;
                      }
                  }

                  if (!$isAllowed) {
                      error_log("[SECURITY WARNING] Attempted to include unauthorized file: {$targetFile}. Skipping.");
                      return "> 🚫 Security Violation: Inclusion of `{$targetFile}` is not permitted by Krubot Nexus policy.";
                  }

                  // ROBUSTNESS: Check if the actual target file exists on disk.
                  if (file_exists($targetFile)) {
                      echo "[INFO] Assimilating dimension: {$targetFile}\n"; // Log successful inclusion for HyperDX.
                      return file_get_contents($targetFile); // Return the content of the included file.
                  }
                  // ROBUSTNESS: If the included file is not found, log a warning and insert a clear placeholder.
                  error_log("[WARNING] Broken meta-link: {$targetFile} not found. Placeholder inserted.");
                  return "> ⚠️ Meta-Link Broken: `{$targetFile}` not found in this reality. Please rectify the dimensional coordinates.";
              },
              $templateContent
          );
          
          // ROBUSTNESS: Check for potential regex errors during the callback process.
          if ($compiledContent === null) {
              error_log("[CRITICAL] Regex callback failed. Check pattern or content for syntax errors.");
              exit(1); 
          }

          // HYPER-PERFORMANCE OPTIMIZATION: Compare compiled content with the existing README.md.
          // This is a key performance and "clean history" feature. If the new compiled content
          // is IDENTICAL to the currently existing README.md, there's no need to write the file
          // or create a new Git commit. This prevents unnecessary file I/O and empty commits.
          $existingReadmeContent = file_exists(README_OUTPUT_PATH) ? file_get_contents(README_OUTPUT_PATH) : "";
          if ($existingReadmeContent === $compiledContent) {
              echo "[INFO] README.md is already perfectly aligned. No content changes detected. 🧘\n";
              // Exit successfully here. The next 'git diff' step will also confirm no changes.
              exit(0); 
          }

          // If content has actually changed, write the new compiled content to README.md.
          file_put_contents(README_OUTPUT_PATH, $compiledContent);
          echo "[SUCCESS] The Ultimate Krubot Lexicon is forged and ready for serve &/ manifestation. 🔮\n";
          EOPHP
          )"

      # Step 4: Commit and Push the final output back to the repository.
      # This step is meticulously designed for maximum performance, minimal noise, and infinite loop prevention.
      - name: "Manifest & Commit Unified README ⚒️📜🖋"
        run: |
          # Configure Git with a dedicated bot persona. This clearly indicates automatic commits (HyperDX).
          git config --global user.name  "KrubiK Lexicon Architect"
          git config --global user.email "lexicon.architect@storyko.de"
          
          # Stage the generated README.md file for commit.
          git add README.md
          
          # PERFORMANCE CHECK: 'git diff --staged --quiet' is a CRITICAL optimization.
          # It checks if there are any ACTUAL changes staged for commit. If there are no changes
          # (i.e., the compiled README.md is identical to the one already in the repo),
          # this command returns 0. In such cases, we gracefully exit, preventing an empty commit.
          if git diff --staged --quiet; then
            echo "[INFO] README.md is already perfectly aligned. Skipping commit to maintain dimensional stability. 🧘"
          else
            # Commit the changes with a descriptive message.
            # '[skip ci]' is ABSOLUTELY VITAL. It tells GitHub Actions to IGNORE this specific push event
            # for triggering workflows. Without it, the bot's push would trigger the workflow again,
            # leading to an INFINITE LOOP of workflow runs, consuming resources and potentially hitting limits.
            git commit -m "lexicon(warlord()): Auto-merged lexicon dimensional fragments into README 🚀🌀 [skip ci]"
            # Push the committed changes back to the 'main' branch.
            git push
            echo "[SUCCESS] Unified README.md manifested and pushed to the main dimension. 🚀"
          fi